name: Build Android TWA (APK & AAB)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions page!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Packages
      run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Decode Production Keystore From Secrets
      env:
        JKS_BASE64: ${{ secrets.JKS_BASE64 }}
      run: |
        if [ -n "$JKS_BASE64" ]; then
          mkdir -p app/keystore
          echo "$JKS_BASE64" | base64 --decode > app/keystore/release.jks
          echo "KEYSTORE_FILE=keystore/release.jks" >> "$GITHUB_ENV"
        fi

    - name: Build Signed Release APK & AAB
      run: ./gradlew assembleRelease bundleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWA-Release-APK
        path: app/build/outputs/apk/release/app-release.apk

    - name: Upload Release AAB Bundle (Play Store)
      uses: actions/upload-artifact@v4
      with:
        name: TWA-Release-AAB
        path: app/build/outputs/bundle/release/app-release.aab
